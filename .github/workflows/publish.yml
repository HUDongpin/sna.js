name: Publish to npm

# Manually dispatched against a release tag (e.g. v0.2.0):
#   gh workflow run publish.yml --ref v0.2.0
# Publishing uses npm trusted publishing (OIDC): this repository + workflow
# are configured as a trusted publisher for @peterhudongpin/sna.js on
# npmjs.com. No npm token is stored; npm >= 11.5 detects the OIDC environment
# automatically and attaches provenance. Do NOT pass registry-url to
# setup-node here: it writes an .npmrc with a placeholder NODE_AUTH_TOKEN
# that overrides the OIDC flow and breaks authentication.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm --version
      - name: OIDC diagnostics
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC token request URL is present (id-token permission granted)"
          else
            echo "OIDC token request URL MISSING - id-token permission not granted"
          fi
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run smoke:examples
      - run: npm run size:check
      - name: Verify ref matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          REF_NAME="${GITHUB_REF_NAME}"
          if [[ "$REF_NAME" == v* && "$REF_NAME" != "v$PKG_VERSION" ]]; then
            echo "Tag $REF_NAME does not match package version v$PKG_VERSION" >&2
            exit 1
          fi
          echo "Publishing $PKG_VERSION from $REF_NAME"
      - run: npm publish --loglevel http
